version: "3.9"

services:
  api:
    image: node:20-alpine
    container_name: airp-api
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter @airp/api dev"
    volumes:
      - ./:/workspace
    env_file:
      - .env
    ports:
      - "8081:8081"
    depends_on:
      - mysql
      - redis
      - rabbitmq
      - elasticsearch
    profiles:
      - app

  web:
    image: node:20-alpine
    container_name: airp-web
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter @airp/web dev"
    volumes:
      - ./:/workspace
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - api
    profiles:
      - app

  admin:
    image: node:20-alpine
    container_name: airp-admin
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter @airp/admin dev"
    volumes:
      - ./:/workspace
    env_file:
      - .env
    ports:
      - "3002:3002"
    depends_on:
      - api
    profiles:
      - app

  ai-engine:
    image: python:3.11-slim
    container_name: airp-ai-engine
    working_dir: /workspace/services/ai-engine-python
    command: sh -c "pip install -e . && python -m app.main"
    volumes:
      - ./:/workspace
    env_file:
      - .env
    ports:
      - "8088:8088"
    profiles:
      - app

  mysql:
    image: mysql:8.0
    container_name: airp-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: busy_as_a_shrimp
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: airp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: airp-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: airp
      RABBITMQ_DEFAULT_PASS: airp
    ports:
      - "5672:5672"
      - "15672:15672"

  elasticsearch:
    image: elasticsearch:8.12.2
    container_name: airp-es
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

volumes:
  mysql_data:
  es_data:
