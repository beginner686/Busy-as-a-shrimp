services:
  api:
    image: node:20
    container_name: airp-api
    working_dir: /workspace
    command: sh -c "corepack enable && COREPACK_ENABLE_DOWNLOAD_PROMPT=0 CI=true pnpm install && pnpm --filter @airp/database generate && pnpm --filter @airp/database db:push && pnpm --filter @airp/api build && pnpm --filter @airp/api start"
    volumes:
      - ./:/workspace
      - api_node_modules:/workspace/node_modules
    env_file:
      - .env
    environment:
      MYSQL_HOST: mysql
      DATABASE_URL: mysql://root:123456@mysql:3306/busy_as_a_shrimp
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      ELASTICSEARCH_NODE: http://elasticsearch:9200
      OPENCLAW_BASE_URL: http://ai-engine:8088
      API_PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
      elasticsearch:
        condition: service_started
    restart: unless-stopped

  web:
    image: node:20-alpine
    container_name: airp-web
    working_dir: /workspace
    command: sh -c "corepack enable && COREPACK_ENABLE_DOWNLOAD_PROMPT=0 CI=true pnpm install && pnpm --filter @airp/web dev"
    volumes:
      - ./:/workspace
      - web_node_modules:/workspace/node_modules
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - api

  admin:
    image: node:20-alpine
    container_name: airp-admin
    working_dir: /workspace
    command: sh -c "corepack enable && COREPACK_ENABLE_DOWNLOAD_PROMPT=0 CI=true pnpm install && pnpm --filter @airp/admin dev"
    volumes:
      - ./:/workspace
      - admin_node_modules:/workspace/node_modules
    env_file:
      - .env
    ports:
      - "3002:3002"
    depends_on:
      - api

  ai-engine:
    image: python:3.11-slim
    container_name: airp-ai-engine
    working_dir: /workspace/services/ai-engine-python
    command: sh -c "pip install -e . && python -m app.main"
    volumes:
      - ./:/workspace
    env_file:
      - .env
    ports:
      - "8088:8088"
    profiles:
      - app

  mysql:
    image: mysql:8.0
    container_name: airp-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: busy_as_a_shrimp
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 15s

  redis:
    image: redis:7
    container_name: airp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: airp-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: airp
      RABBITMQ_DEFAULT_PASS: airp
    ports:
      - "5672:5672"
      - "15672:15672"

  elasticsearch:
    image: elasticsearch:8.12.2
    container_name: airp-es
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

volumes:
  mysql_data:
  es_data:
  api_node_modules:
  web_node_modules:
  admin_node_modules:
